<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kventure – Iniciar Sesión</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold:      #D4A017;
      --gold-lt:   #F0C940;
      --rose:      #E8628A;
      --rose-lt:   #F9A8C9;
      --purple:    #7B3FA0;
      --purple-lt: #B47FD4;
      --white:     #FDF8FF;
      --dark:      #1A0A2E;
      --card-bg:   rgba(255,255,255,0.06);
      --border:    rgba(212,160,23,0.25);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(123,63,160,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(232,98,138,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(212,160,23,0.10) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .orb1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; animation-duration: 14s; }
    .orb2 { width: 300px; height: 300px; background: var(--rose);   bottom: -80px; right: -60px; animation-duration: 10s; }
    .orb3 { width: 250px; height: 250px; background: var(--gold);   top: 50%; left: 60%; animation-duration: 16s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 2.5rem;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(26,10,46,0.75);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--gold), var(--rose-lt), var(--purple-lt));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    nav { display: flex; gap: 2rem; align-items: center; }
    nav a {
      text-decoration: none;
      color: rgba(253,248,255,0.7);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: color 0.2s;
      position: relative;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      transition: width 0.3s;
    }
    nav a:hover { color: var(--white); }
    nav a:hover::after { width: 100%; }

    .nav-cta {
      background: linear-gradient(135deg, var(--gold), var(--rose));
      color: var(--dark) !important;
      padding: 0.45rem 1.2rem;
      border-radius: 50px;
      font-weight: 600 !important;
      transition: transform 0.2s, box-shadow 0.2s !important;
    }
    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232,98,138,0.4);
    }
    .nav-cta::after { display: none !important; }

    
    .pagina {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    
    .etiqueta {
      display: inline-block;
      padding: 0.35rem 1.2rem;
      border: 1px solid var(--gold);
      border-radius: 50px;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
      animation: fadeUp 0.8s ease both;
    }

    
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.9s ease 0.1s both;
    }
    h1 .grad {
      background: linear-gradient(135deg, var(--gold-lt) 0%, var(--rose) 45%, var(--purple-lt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitulo {
      color: rgba(253,248,255,0.5);
      font-size: 1rem;
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 1s ease 0.2s both;
    }

    
    .tarjeta {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(12px);
      animation: fadeUp 1s ease 0.25s both;
      position: relative;
      overflow: hidden;
    }

    
    .tarjeta::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    
    #mensaje {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      text-align: center;
    }
    #mensaje.error {
      background: rgba(232,98,138,0.12);
      border: 1px solid rgba(232,98,138,0.35);
      color: var(--rose-lt);
      display: block;
    }
    #mensaje.exito {
      background: rgba(212,160,23,0.12);
      border: 1px solid rgba(212,160,23,0.35);
      color: var(--gold-lt);
      display: block;
    }

    
    .campo {
      margin-bottom: 1.2rem;
    }
    .campo label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(253,248,255,0.5);
      margin-bottom: 8px;
    }
    .campo input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .campo input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,160,23,0.12);
    }
    .campo input::placeholder { color: rgba(253,248,255,0.25); }

    
    .fila-opciones {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.2rem 0 1.6rem;
    }
    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(253,248,255,0.5);
      cursor: pointer;
    }
    .check-label input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--gold);
      cursor: pointer;
    }
    .enlace {
      font-size: 13px;
      color: var(--rose-lt);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .enlace:hover { opacity: 0.7; }

    
    .boton-principal {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--rose));
      color: var(--dark);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .boton-principal:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(232,98,138,0.35);
    }
    .boton-principal:active { transform: translateY(0); }
    .boton-principal:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    
    .separador {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.4rem 0;
      color: rgba(253,248,255,0.25);
      font-size: 12px;
    }
    .separador::before, .separador::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    
    .registro {
      text-align: center;
      font-size: 14px;
      color: rgba(253,248,255,0.45);
    }
    .registro a {
      color: var(--gold-lt);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .registro a:hover { opacity: 0.75; }

    
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      color: rgba(253,248,255,0.3);
      font-size: 0.82rem;
      letter-spacing: 0.5px;
    }
    footer span { color: var(--rose); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      header { padding: 0 1.2rem; }
      nav { gap: 1rem; }
      .tarjeta { padding: 2rem 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <header>
    <div class="logo">Kventure</div>
    <nav>
      <a href="Inicio.html">Inicio</a>
      <a href="#">Productos</a>
      <a href="Login.html" class="nav-cta">✦ Login</a>
    </nav>
      <a href="carrito.html" style="position:relative;font-size:1.4rem;text-decoration:none;margin-left:1rem;cursor:pointer;">🛒<span class="carrito-contador" style="position:absolute;top:-8px;right:-10px;background:#E8628A;color:white;border-radius:50%;width:20px;height:20px;font-size:0.7rem;font-weight:700;display:none;align-items:center;justify-content:center;font-family:sans-serif;">0</span></a>
</header>

  <div class="pagina">

    <div class="etiqueta">✦ Acceso seguro ✦</div>
    <h1>Bienvenido de<br/><span class="grad">vuelta, fan.</span></h1>
    <p class="subtitulo">Ingresa tus credenciales para continuar</p>

    <div class="tarjeta">

      
      <div id="mensaje"></div>

      
      <form id="formulario-login">

        <div class="campo">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" placeholder="tu@correo.com" required/>
        </div>

        <div class="campo">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" placeholder="••••••••" required/>
        </div>

        <div class="fila-opciones">
          <label class="check-label">
            <input type="checkbox" id="recordar"/> Recuérdame
          </label>
          <a href="#" class="enlace">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="boton-principal" id="btn-login">
          Iniciar sesión ✦
        </button>

      </form>

      <div class="separador">o</div>
      <p class="registro">¿No tienes cuenta? <a href="#">Regístrate gratis</a></p>

    </div>
  </div>

  <footer>
    <p>© 2025 <span>Kventure</span> — Tu universo K-pop favorito ✦</p>
  </footer>

  
  <script src="js/login.js"></script>


  <script src="js/database.js"></script>
  <script src="js/carrito.js"></script>
  <script src="js/grupo.js"></script>
</body>
</html>
